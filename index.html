<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Fit — Posty78</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --bg:     #0a0a0a;
      --green:  #00cc44;
      --green-dim: rgba(0,204,68,0.1);
      --border: rgba(0,204,68,0.25);
      --white:  #ffffff;
      --muted:  #557755;
      --font:   "Inter", system-ui, sans-serif;
      --mono:   "JetBrains Mono", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: var(--font); background: var(--bg); color: var(--white); }

    #map { position: absolute; inset: 0; z-index: 0; }

    #top {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 400;
      background: rgba(0,0,0,0.85);
      border: 2px solid var(--green);
      border-radius: 16px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    #top h1 { font-size: 16px; font-weight: 900; color: var(--green); }

    #btn-locate {
      height: 42px;
      padding: 0 20px;
      background: var(--green);
      color: #000;
      font-size: 14px;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: var(--font);
    }

    #btn-locate:hover { opacity: 0.88; }

    /* ─── Panneau résultats ─── */
    #results-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 400;
      background: rgba(0,0,0,0.95);
      border-top: 2px solid var(--green);
      border-radius: 20px 20px 0 0;
      padding: 16px;
      max-height: 60vh;
      overflow-y: auto;
      display: none;
      backdrop-filter: blur(12px);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .panel-header h2 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--green);
    }

    #close-results {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
    }

    .result-item {
      background: rgba(0,204,68,0.04);
      border: 1px solid rgba(0,204,68,0.15);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .result-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .result-num {
      font-size: 11px;
      font-weight: 700;
      color: #000;
      background: var(--green);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .result-info { flex: 1; }

    .result-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }

    .result-dist {
      font-size: 13px;
      font-family: var(--mono);
      color: var(--green);
      font-weight: 700;
    }

    .result-details {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.5;
    }

    .result-details span {
      display: block;
    }

    .result-btns {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-nav {
      flex: 1;
      height: 38px;
      font-size: 13px;
      font-weight: 800;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
    }

    .btn-waze { background: #33ccff; color: #000; }
    .btn-gmaps { background: #4285f4; color: #fff; }

    /* ─── Loader ─── */
    #loader {
      position: absolute;
      inset: 0;
      z-index: 1000;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #loader p { font-size: 13px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(0,204,68,0.2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Popup Leaflet custom ─── */
    .leaflet-popup-content-wrapper {
      background: rgba(0,0,0,0.92) !important;
      border: 2px solid var(--green) !important;
      border-radius: 12px !important;
      color: var(--white) !important;
      min-width: 220px;
    }

    .leaflet-popup-tip { background: var(--green) !important; }

    .popup-content { padding: 4px; }
    .popup-name { font-size: 15px; font-weight: 800; color: var(--green); margin-bottom: 8px; }
    .popup-detail { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 4px; display: flex; gap: 6px; }
    .popup-detail strong { color: var(--white); min-width: 60px; }
    .popup-btns { display: flex; gap: 8px; margin-top: 10px; }
    .popup-btn {
      flex: 1;
      height: 34px;
      font-size: 12px;
      font-weight: 800;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .popup-btn-waze { background: #33ccff; color: #000; }
    .popup-btn-gmaps { background: #4285f4; color: #fff; }

    .leaflet-control-zoom a {
      background: #111 !important;
      color: var(--white) !important;
      border-color: var(--border) !important;
    }

    .leaflet-control-attribution {
      background: rgba(0,0,0,0.5) !important;
      color: var(--muted) !important;
      font-size: 10px !important;
    }

    @media (max-width: 480px) {
      #top { padding: 10px 14px; gap: 8px; }
      #top h1 { font-size: 13px; }
      #btn-locate { height: 36px; padding: 0 14px; font-size: 13px; }
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Chargement des Basic Fit…</p>
</div>

<div id="map"></div>

<div id="top">
  <h1>🏋️ Basic Fit France</h1>
  <button id="btn-locate">📍 Me localiser</button>
</div>

<div id="results-panel">
  <div class="panel-header">
    <h2>🏋️ Les 10 Basic Fit les plus proches</h2>
    <button id="close-results" onclick="closeResults()">✕</button>
  </div>
  <div id="results-list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map', { zoomControl: true }).setView([46.6, 1.9], 6);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
  }).addTo(map);

  const bfIcon = L.divIcon({
    className: '',
    html: `<div style="width:30px;height:30px;background:#00cc44;border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;">🏋️</div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15]
  });

  const userIcon = L.divIcon({
    className: '',
    html: `<div style="width:18px;height:18px;background:#3b82f6;border:3px solid #fff;border-radius:50%;"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9]
  });

  let allGyms = [];
  let userMarker = null;
  let userPos = null;

  const query = `[out:json][timeout:30];
area["ISO3166-1"="FR"][admin_level=2];
(
  node["brand"="Basic-Fit"](area);
  way["brand"="Basic-Fit"](area);
);
out center tags;`;

  fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    body: 'data=' + encodeURIComponent(query)
  })
    .then(r => r.json())
    .then(data => {
      allGyms = data.elements.map(el => {
        const t = el.tags || {};
        return {
          lat: el.lat || el.center?.lat,
          lon: el.lon || el.center?.lon,
          name: t.name || 'Basic-Fit',
          street: t['addr:street'] || '',
          housenumber: t['addr:housenumber'] || '',
          postcode: t['addr:postcode'] || '',
          city: t['addr:city'] || '',
          phone: t.phone || t['contact:phone'] || '',
          opening: t.opening_hours || '',
          website: t.website || t['contact:website'] || '',
        };
      }).filter(g => g.lat && g.lon);

      allGyms.forEach(g => {
        const addrLine = [g.housenumber, g.street].filter(Boolean).join(' ');
        const cityLine = [g.postcode, g.city].filter(Boolean).join(' ');

        const popupHtml = `
          <div class="popup-content">
            <div class="popup-name">🏋️ ${g.name}</div>
            ${addrLine ? `<div class="popup-detail"><strong>Adresse</strong>${addrLine}</div>` : ''}
            ${cityLine ? `<div class="popup-detail"><strong>Ville</strong>${cityLine}</div>` : ''}
            ${g.phone ? `<div class="popup-detail"><strong>Tél</strong>${g.phone}</div>` : ''}
            ${g.opening ? `<div class="popup-detail"><strong>Horaires</strong>${g.opening}</div>` : ''}
            <div class="popup-btns">
              <a class="popup-btn popup-btn-waze" href="https://waze.com/ul?ll=${g.lat},${g.lon}&navigate=yes" target="_blank">🚗 Waze</a>
              <a class="popup-btn popup-btn-gmaps" href="https://www.google.com/maps/dir/?api=1&destination=${g.lat},${g.lon}" target="_blank">🗺️ Maps</a>
            </div>
          </div>`;

        L.marker([g.lat, g.lon], { icon: bfIcon })
          .addTo(map)
          .bindPopup(popupHtml, { maxWidth: 280 });
      });

      document.getElementById('loader').style.display = 'none';
    })
    .catch(() => {
      document.getElementById('loader').innerHTML = '<p style="color:#ef4444">Erreur de chargement</p>';
    });

  document.getElementById('btn-locate').addEventListener('click', () => {
    if (!navigator.geolocation) return alert('Géolocalisation non supportée');
    navigator.geolocation.getCurrentPosition(pos => {
      userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      if (userMarker) userMarker.remove();
      userMarker = L.marker([userPos.lat, userPos.lon], { icon: userIcon })
        .addTo(map).bindPopup('📍 Vous êtes ici').openPopup();
      map.setView([userPos.lat, userPos.lon], 11);
      showNearest();
    }, () => alert('Impossible de te localiser'));
  });

  function distKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.asin(Math.sqrt(a));
  }

  function showNearest() {
    if (!userPos || !allGyms.length) return;
    const sorted = allGyms
      .map(g => ({ ...g, dist: distKm(userPos.lat, userPos.lon, g.lat, g.lon) }))
      .sort((a, b) => a.dist - b.dist)
      .slice(0, 10);

    document.getElementById('results-list').innerHTML = sorted.map((g, i) => {
      const addrLine = [g.housenumber, g.street].filter(Boolean).join(' ');
      const cityLine = [g.postcode, g.city].filter(Boolean).join(' ');
      return `
        <div class="result-item">
          <div class="result-top">
            <div class="result-num">${i + 1}</div>
            <div class="result-info">
              <div class="result-name">${g.name}</div>
              <div class="result-dist">${g.dist.toFixed(1)} km</div>
              <div class="result-details">
                ${addrLine ? `<span>📍 ${addrLine}</span>` : ''}
                ${cityLine ? `<span>🏙️ ${cityLine}</span>` : ''}
                ${g.phone ? `<span>📞 ${g.phone}</span>` : ''}
                ${g.opening ? `<span>🕐 ${g.opening}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="result-btns">
            <a class="btn-nav btn-waze" href="https://waze.com/ul?ll=${g.lat},${g.lon}&navigate=yes" target="_blank">🚗 Waze</a>
            <a class="btn-nav btn-gmaps" href="https://www.google.com/maps/dir/?api=1&destination=${g.lat},${g.lon}" target="_blank">🗺️ Google Maps</a>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('results-panel').style.display = 'block';
  }

  function closeResults() {
    document.getElementById('results-panel').style.display = 'none';
  }
</script>

</body>
</html>
